apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-client
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-client
  template:
    metadata:
      labels:
        app: api-client
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node # Deploy client on the same node
      containers:
      - name: client-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:bd97f23fe815548740bf04fae88cf7317c397e9a
        imagePullPolicy: Always
        command: ["python", "app/client.py"]
        env:
        # The client finds the server using the internal Kubernetes DNS name
        - name: SERVICE_ENDPOINT
          value: "http://image-processor-svc:8080"
        # Env vars for the client to push its own metrics
        - name: SERVICE_NAME
          value: "api-client"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4318"
