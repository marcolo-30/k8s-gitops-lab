# dev/client-deployment.yaml - CLIENT ONLY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-client
  namespace: myapp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: api-client
  template:
    metadata:
      labels:
        app: api-client
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: client-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:f7750bbcf722957d89becd199434536dde0a8204
        imagePullPolicy: Always
        # --- CORRECTED COMMAND ---
        # Add the --continuous flag to run in a loop.
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install Pillow requests && \
          python client.py --continuous
        env:
        - name: SERVICE_ENDPOINT
          # This should point to the correct service name for the naive server
          value: "http://image-processor-naive-svc:8080"
