# dev/client-deployment.yaml - CLIENT ONLY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-client
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-client
  template:
    metadata:
      labels:
        app: api-client
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: client-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:3a65a91c475741c403f5c32c497750de9abeacf3
        imagePullPolicy: Always
        # Assuming WORKDIR in Dockerfile is /app, this executes /app/client.py
        command: ["python", "client.py"]
        env:
        # The client finds the server using the correct internal Kubernetes DNS name
        - name: SERVICE_ENDPOINT
          value: "http://image-processor-svc:8080"
        - name: SERVICE_NAME
          value: "api-client"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4318"
