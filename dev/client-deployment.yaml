# dev/client-deployment.yaml - CLIENT ONLY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-client
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-client
  template:
    metadata:
      labels:
        app: api-client
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: client-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:d459b39d1718d2e46eafc9b21b2895d166a99132
        imagePullPolicy: Always
        # --- CORRECTED COMMAND ---
        # Add the --continuous flag to run in a loop.
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install Pillow requests && \
          python client.py --continuous
        env:
        - name: SERVICE_ENDPOINT
          # This should point to the correct service name for the naive server
          value: "http://image-processor-naive-svc:8080"
        # CORRECTED: Updated OTEL_EXPORTER_OTLP_ENDPOINT to the new IP address
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://192.168.0.42:4318"
