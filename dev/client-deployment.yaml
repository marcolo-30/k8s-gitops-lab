# dev/client-deployment.yaml - Client Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-client
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-client
  template:
    metadata:
      labels:
        app: api-client
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: client-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:15838b4b2732e3ca249c6af97c055cfb110e3c54
        imagePullPolicy: Always
        # The image already has client.py and all Python deps installed via the
        # Dockerfile; no need to pip install at runtime.
        command: ["python", "client.py", "--continuous"]
        env:
        - name: SERVICE_ENDPOINT
          value: "http://image-processor-naive-svc:8080"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability:4318"
        - name: SERVICE_NAME
          value: "image-processor-client"
        - name: REQUEST_INTERVAL
          value: "2.0"
        - name: REQUEST_TIMEOUT
          value: "60.0"
        - name: MAX_RETRIES
          value: "5"
        - name: MAX_RETRY_DELAY
          value: "30.0"
        - name: IMAGE_WIDTH
          value: "1920"
        - name: IMAGE_HEIGHT
          value: "1080"
        # Repeticiones del bloque pesado (blur+sharpen+contrast) a resolución completa.
        # 3 ≈ 25% CPU en el servidor, sube/baja para calibrar.
        - name: PIPELINE_REPEATS
          value: "3"
        resources:
          requests:
            cpu: "50m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
