apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node # Make sure this is the correct node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:latest
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "200000"
            - name: NUM_WORKERS
              # Using 3 out of 4 cores to target ~75% CPU usage, keeping it below 90%
              value: "3"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
