apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node # Make sure this is the correct node
      containers:
        - name: main-app
          # IMPORTANT: You will need to build and push a new image with the updated main.py
          image: ghcr.io/marcolo-30/k8s-gitops-lab:d9179f6d05048ed7e650790c5d8b13d92f2b8868
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              # A high value to keep the workers busy.
              # Adjust if the CPU doesn't hit 100%.
              value: "200000"
          resources:
            # This pod is 'Burstable'. It is guaranteed 100m of CPU.
            requests:
              cpu: "100m"
              memory: "128Mi" # Increased memory for multiple processes
            # By NOT setting a CPU limit, it can use all available cores
            # and be throttled by other high-priority pods.
