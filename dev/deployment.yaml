# dev/deployment.yaml - Naive Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-processor-naive
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-processor-naive
  template:
    metadata:
      labels:
        app: image-processor-naive
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: image-processor-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:f7750bbcf722957d89becd199434536dde0a8204
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http-api
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: SERVICE_NAME
          value: "image-processor-naive"
        # CORRECTED: Updated OTEL_EXPORTER_OTLP_ENDPOINT to the new IP address
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://192.168.0.42:4318"
        # The new server uses this for its latency score calculation
        - name: QOS_LATENCY_BASELINE
          value: "0.5"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
