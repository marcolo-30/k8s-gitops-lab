# dev/deployment.yaml - SERVER ONLY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-processor
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-processor
  template:
    metadata:
      labels:
        app: image-processor
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: image-processor-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:e12dabb4a27ac2e99ccf416333e5b173e087c943
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http-api
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        env:
        - name: SERVICE_NAME
          value: "image-processor"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4318"
        - name: WORKLOAD_SIZE
          value: "2000000"
        - name: LATENCY_HEALTHY_SECONDS
          value: "4.0"
        - name: LATENCY_CRITICAL_SECONDS
          value: "10.0"
        - name: MIN_REALISTIC_DURATION
          value: "1.0" # Tasks shorter than 1s are considered errors
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
