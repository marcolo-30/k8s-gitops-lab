apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node # Make sure this is the correct node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:79be90fd2a97633341411c5741102dc1b7138b42
          imagePullPolicy: Always
          ports: # Expose the health check port
            - containerPort: 8080
              name: http-health
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "200000"
            - name: NUM_WORKERS
              value: "3"
            - name: QOS_CPU_HEALTHY_THRESHOLD
              value: "70.0"
            - name: QOS_CPU_CRITICAL_THRESHOLD
              value: "20.0"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
