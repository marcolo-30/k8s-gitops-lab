apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:923767db79731ad8281d29b077998430b6ccc5d2
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "80000"
            - name: NUM_WORKERS
              value: "1"
            - name: CALIBRATION_SECONDS
              value: "30"
            - name: QOS_WEIGHT_THROTTLE
              value: "0.70"
            - name: QOS_WEIGHT_ITERS
              value: "0.30"
            - name: EMA_ALPHA
              value: "0.15"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"       # ← request bajo, solo reserva mínima
              memory: "128Mi"
            limits:
              cpu: "950m"      # ← 1.5 cores, margen para correr sin throttle
              memory: "256Mi"
          volumeMounts:
            - name: sys-thermal
              mountPath: /sys/class/thermal
              readOnly: true
            - name: cgroup-unified
              mountPath: /sys/fs/cgroup
              readOnly: true
      volumes:
        - name: sys-thermal
          hostPath:
            path: /sys/class/thermal
            type: Directory
        - name: cgroup-unified
          hostPath:
            path: /sys/fs/cgroup
            type: Directory