apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http-health
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "80000"
            - name: NUM_WORKERS
              value: "1"
            - name: CALIBRATION_SECONDS
              value: "30"
            - name: QOS_LOAD_THRESHOLD
              value: "70"
            - name: QOS_FLOOR
              value: "5"
            - name: QOS_WEIGHT_LOAD
              value: "0.70"
            - name: QOS_WEIGHT_ITERS
              value: "0.30"
            - name: EMA_ALPHA
              value: "0.15"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
          volumeMounts:
            - name: sys-thermal
              mountPath: /sys/class/thermal
              readOnly: true
      volumes:
        - name: sys-thermal
          hostPath:
            path: /sys/class/thermal
            type: Directory
