apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:c205d8638dc7bda46c760798a468d72abe95ff5c
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "80000"
            - name: NUM_WORKERS
              value: "1"
            - name: CALIBRATION_SECONDS
              value: "30"
            # --- QoS load-based signal (replaces throttle) ---
            - name: QOS_LOAD_THRESHOLD   # node load% where QoS starts degrading
              value: "70"
            - name: QOS_FLOOR            # minimum QoS when node is at 100% load
              value: "5"
            - name: QOS_WEIGHT_LOAD      # weight for node load signal (was QOS_WEIGHT_THROTTLE)
              value: "0.70"
            - name: QOS_WEIGHT_ITERS
              value: "0.30"
            - name: EMA_ALPHA
              value: "0.15"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "100m"      # keep for scheduling purposes
              memory: "128Mi"
            limits:
              memory: "256Mi"  # always keep memory limit
              # NO limits.cpu — removed intentionally to eliminate throttling
          volumeMounts:
            - name: sys-thermal
              mountPath: /sys/class/thermal
              readOnly: true
            # cgroup volume removed — no longer needed without limits.cpu
      volumes:
        - name: sys-thermal
          hostPath:
            path: /sys/class/thermal
            type: Directory
        # cgroup-unified volume removed — track_throttle() replaced by track_node_load()