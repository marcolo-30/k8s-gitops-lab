apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:4614b91b1d1231dc301a086516264a59b338b05b
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "200000"
            - name: NUM_WORKERS
              value: "3"
            - name: CALIBRATION_SECONDS
              value: "30"
            - name: QOS_WEIGHT_THROTTLE
              value: "0.70"
            - name: QOS_WEIGHT_ITERS
              value: "0.30"
            - name: EMA_ALPHA
              value: "0.15"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: sys-thermal       # ← nombre debe coincidir exactamente con volumes[]
              mountPath: /sys/class/thermal
              readOnly: true          # readOnly va aquí, no en hostPath.type
            - name: cgroup-unified    # ← nombre actualizado para claridad
              mountPath: /sys/fs/cgroup
              readOnly: true
      volumes:
        - name: sys-thermal
          hostPath:
            path: /sys/class/thermal
            type: Directory           # solo "Directory", nunca "DirectoryReadOnly"
        - name: cgroup-unified
          hostPath:
            path: /sys/fs/cgroup      # ← cgroups v2: jerarquía unificada
            type: Directory