apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:32d98ed1d7423596aa145d2435087df5c38db7cf
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "200000"
            - name: NUM_WORKERS
              value: "3"
            # Autocalibración: segundos de warmup para medir baseline de iter/s
            - name: CALIBRATION_SECONDS
              value: "30"
            # Pesos del QoS compuesto (deben sumar 1.0)
            - name: QOS_WEIGHT_THROTTLE
              value: "0.70"   # señal primaria: throttling de cgroups
            - name: QOS_WEIGHT_ITERS
              value: "0.30"   # señal secundaria: iter/s vs baseline
            # EMA: qué tan rápido reacciona (0.1=suave, 0.3=reactivo)
            - name: EMA_ALPHA
              value: "0.15"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"        # ← activa el throttling de cgroups
              memory: "256Mi"
          volumeMounts:
            - name: sys-thermal
              mountPath: /sys/class/thermal
              readOnly: true
            # Exponer cgroups del propio pod para leer cpu.stat
            - name: cgroup-cpu
              mountPath: /sys/fs/cgroup/cpu
              readOnly: true
      volumes:
        - name: sys-thermal
          hostPath:
            path: /sys/class/thermal
            type: Directory
        # cgroups v1 — ajustar el path si el nodo usa cgroups v2
        - name: cgroup-cpu
          hostPath:
            path: /sys/fs/cgroup/cpu
            type: Directory