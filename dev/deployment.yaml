apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-processor
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-processor
  template:
    metadata:
      labels:
        app: image-processor
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: image-processor-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:322fdf71dd72a2cc0db8f74a125d3b6ace2cefa2
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http-api
        env:
        - name: SERVICE_NAME
          value: "image-processor"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4318"
        - name: WORKLOAD_SIZE
          value: "2000000"
        - name: LATENCY_HEALTHY_SECONDS
          value: "2.0"
        - name: LATENCY_CRITICAL_SECONDS
          value: "10.0"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
