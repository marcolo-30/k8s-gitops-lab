apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node # Make sure this is the correct node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:2a9c07f4d20a80c7e14c84c8281ebb0549239d6f
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: WORKLOAD_SIZE
              value: "200000"
            - name: NUM_WORKERS
              value: "3"
            # QoS thresholds
            - name: QOS_CPU_HEALTHY_THRESHOLD
              value: "70.0" # If pod CPU >= 70%, QoS is 100
            - name: QOS_CPU_CRITICAL_THRESHOLD
              value: "20.0" # If pod CPU <= 20%, QoS is 0
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: sys-thermal
              mountPath: /sys/class/thermal
              readOnly: true
      volumes:
        - name: sys-thermal
          hostPath:
            path: /sys/class/thermal
            type: Directory # Corregido: debe ser 'Directory'
