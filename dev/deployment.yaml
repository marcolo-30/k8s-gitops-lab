apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-processor
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-processor
  template:
    metadata:
      labels:
        app: image-processor
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      # --- Contenedor 1: El Servidor (image-processor) ---
      - name: image-processor-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http-api
        env:
        - name: SERVICE_NAME
          value: "image-processor"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4318"
        - name: WORKLOAD_SIZE
          value: "2000000"
        # --- Umbrales Calibrados para un QoS de 100 ---
        - name: LATENCY_HEALTHY_SECONDS
          value: "4.0" # <-- Ajustado para que ~3.65s sea 100% QoS
        - name: LATENCY_CRITICAL_SECONDS
          value: "10.0"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"

      # --- Contenedor 2: El Cliente (api-client) ---
      - name: client-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:latest
        imagePullPolicy: Always
        command: ["python", "app/client.py"]
        env:
        - name: SERVICE_ENDPOINT
          value: "http://localhost:8080"
        - name: SERVICE_NAME
          value: "api-client"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4318"
