# dev/deployment.yaml - Image Processor Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-processor-naive
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-processor-naive
  template:
    metadata:
      labels:
        app: image-processor-naive
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
      - name: image-processor-container
        image: ghcr.io/marcolo-30/k8s-gitops-lab:f7750bbcf722957d89becd199434536dde0a8204
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          LOG=/tmp/startup.log

          log() { echo "[$(date '+%H:%M:%S')] $*" | tee -a $LOG; }

          log "=========================================="
          log "STARTUP: container is alive"
          log "Node    : $(hostname)"
          log "Python  : $(python --version 2>&1)"
          log "Working : $(pwd)"
          log "Files   : $(ls *.py 2>/dev/null | tr '\n' ' ')"
          log "=========================================="

          log "STEP 1/3 — installing Python dependencies..."
          pip install fastapi "uvicorn[standard]" Pillow psutil \
            opentelemetry-sdk opentelemetry-api \
            opentelemetry-exporter-otlp-proto-http pydantic \
            2>&1 | tee -a $LOG
          log "STEP 1/3 — pip install EXIT CODE: $?"

          log "STEP 2/3 — verifying imports..."
          python -c "
          import fastapi, uvicorn, PIL, psutil
          from opentelemetry import metrics
          print('  fastapi      OK')
          print('  uvicorn      OK')
          print('  Pillow       OK  version=' + PIL.__version__)
          print('  psutil       OK  cpu_count=' + str(psutil.cpu_count()))
          print('  opentelemetry OK')
          " 2>&1 | tee -a $LOG
          log "STEP 2/3 — import check EXIT CODE: $?"

          log "STEP 3/3 — launching main.py on port 8080..."
          exec python main.py 2>&1 | tee -a $LOG
        ports:
        - containerPort: 8080
          name: http-api
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
        env:
        - name: SERVICE_NAME
          value: "image-processor-naive"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability:4318"
        # ── QoS tuning ────────────────────────────────────────────────────────
        # Set this to your measured idle processing time (curl /health when no load).
        # If baseline=0.5s and under load it takes 2s → latency_score = 0.25
        - name: QOS_LATENCY_BASELINE
          value: "0.5"
        # Sliding window for rate-based metrics (rejection, retry)
        - name: QOS_WINDOW_SECONDS
          value: "60"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          # No CPU limit — so the burner can actually starve it