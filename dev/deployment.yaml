apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      nodeSelector:
        kubernetes.io/hostname: r3-node
      containers:
        - name: main-app
          image: ghcr.io/marcolo-30/k8s-gitops-lab:04600f230ac874181b5ba5a78a8c42989df2daf5
          imagePullPolicy: Always
          env:
            - name: SERVICE_NAME
              value: "main-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://10.43.138.250:4318"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_COST
              value: "1.0"        # RPi = cheap. Change to "2.5" when on vm1node
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            # No CPU limit intentionally — pod competes freely
            # so burner impact is visible in metrics