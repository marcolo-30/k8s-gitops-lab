apiVersion: v1
kind: Service
metadata:
  name: main-app-service
  namespace: myapp
spec:
  type: NodePort
  selector:
    app: main-app # This must match the labels on your pod
  ports:
    - protocol: TCP
      port: 8080 # Port inside the cluster
      targetPort: 8080 # Port on the pod (must match containerPort)
      nodePort: 30007 # Statically assigning the NodePort
